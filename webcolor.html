<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaina Rara - Dynamic Core</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #fff; 
        }
        #canvas-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, mesh;
        let mouseX = 0, mouseY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 4;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Geometría base: Icosaedro con subdivisión alta para deformación suave
            const geometry = new THREE.IcosahedronGeometry(2, 12);
            
            // Material Normal (Multicolor) con inyección de Shader para movimiento cromático
            const material = new THREE.MeshNormalMaterial({ wireframe: true });
            
            material.onBeforeCompile = (shader) => {
                shader.uniforms.uTime = { value: 0 };
                shader.fragmentShader = `uniform float uTime;\n` + shader.fragmentShader;
                shader.fragmentShader = shader.fragmentShader.replace(
                    'gl_FragColor = vec4( packNormalToRGB( normal ), opacity );',
                    `
                    vec3 dynamicNormal = normal;
                    // El truco para que el arcoíris fluya solo
                    dynamicNormal.x += sin(uTime * 0.5);
                    dynamicNormal.y += cos(uTime * 0.5);
                    gl_FragColor = vec4( packNormalToRGB( dynamicNormal ), opacity );
                    `
                );
                material.userData.shader = shader;
            };

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Guardar posiciones originales para referencia de deformación
            mesh.geometry.userData = { originalPositions: geometry.attributes.position.array.slice() };

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) - 0.5;
                mouseY = (e.clientY / window.innerHeight) - 0.5;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.002;

            // 1. Actualizar el "flow" de colores en el shader
            if (mesh.material.userData.shader) {
                mesh.material.userData.shader.uniforms.uTime.value = time;
            }

            // 2. Rotación constante
            mesh.rotation.x += 0.005;
            mesh.rotation.y += 0.01;

            // 3. Lógica de deformación "Vaina Rara"
            const positions = mesh.geometry.attributes.position.array;
            const originals = mesh.geometry.userData.originalPositions;

            for (let i = 0; i < positions.length; i += 3) {
                // Amplitud basada en el mouse
                const amp = 0.5 + (mouseX * 2); 
                
                // Algoritmo de distorsión Seno/Coseno
                positions[i]     = originals[i]     + Math.sin(time + originals[i+1]) * amp;
                positions[i + 1] = originals[i + 1] + Math.cos(time + originals[i]) * amp;
                positions[i + 2] = originals[i + 2] + Math.sin(time + originals[i+2]) * amp;
            }
            
            mesh.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
