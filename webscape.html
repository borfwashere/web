<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Webscape Engine - Secure iOS Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
            background-color: #000;
            /* Protección de interfaz */
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none; 
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #webscape-ui {
            position: fixed; 
            top: env(safe-area-inset-top, 15px); 
            left: env(safe-area-inset-left, 12px); 
            z-index: 100;
            background: rgba(192, 192, 192, 0.9); 
            border: 2px outset #fff;
            padding: 8px; 
            display: flex; 
            gap: 8px;
            box-shadow: 3px 3px 0 #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .ui-label { font-size: 11px; color: #000; align-self: center; font-weight: bold; }
        .mode-btn { 
            background: #c0c0c0; border: 2px outset #fff; 
            padding: 5px 12px; font-size: 11px; cursor: pointer; 
            font-weight: bold; -webkit-appearance: none; 
        }
        .mode-btn.active { background: #d0d0d0; border: 2px inset #fff; color: #000080; }
    </style>
</head>
<body id="main-body" oncontextmenu="return false;">

    <div id="webscape-ui">
        <span class="ui-label">ENGINE:</span>
        <button id="btn-dark" class="mode-btn active" onclick="setEffect('dark')">DARK</button>
        <button id="btn-color" class="mode-btn" onclick="setEffect('color')">COLOR</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        /**
         * CAPA DE PROTECCIÓN TOTAL + OPTIMIZACIÓN iOS
         */
        (function() {
            // Bloqueo de menú contextual (Click derecho / Long press iOS)
            document.addEventListener('contextmenu', e => e.preventDefault());

            // Bloqueo de teclas de acceso (F12, Ctrl+Shift+I, etc.)
            document.addEventListener('keydown', e => {
                if (
                    e.key === "F12" || 
                    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) || 
                    (e.ctrlKey && e.key === "u") ||
                    (e.metaKey && e.altKey && e.key === "i") 
                ) {
                    e.preventDefault();
                    return false;
                }
            });

            // Trampa de Debugger (Pausa infinita si abren consola)
            setInterval(function() {
                (function() { return false; }['constructor']('debugger')());
            }, 200);

            // Protección contra drag & drop
            document.addEventListener('dragstart', e => e.preventDefault());

            // Fix específico para Safari iOS (Previene scroll elástico y gestos nativos)
            document.addEventListener('touchmove', function(e) {
                if(e.touches.length > 1) return;
                e.preventDefault();
            }, { passive: false });
        })();

        let scene, camera, renderer, mesh, matDark, matColor;
        let targetX = 0, targetY = 0, currentX = 0, currentY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // Renderizado de alto rendimiento para WebKit
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true, 
                powerPreference: "high-performance",
                precision: "highp" 
            });
            
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0)); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geometry = new THREE.IcosahedronGeometry(2, 22); 

            matDark = new THREE.MeshNormalMaterial({ wireframe: true, flatShading: true });
            matColor = new THREE.MeshNormalMaterial({ wireframe: true });
            
            matColor.onBeforeCompile = (shader) => {
                shader.uniforms.uTime = { value: 0 };
                shader.vertexShader = `varying vec3 vLPos;\n` + shader.vertexShader;
                shader.vertexShader = shader.vertexShader.replace(`#include <begin_vertex>`, `#include <begin_vertex>\nvLPos = position;`);
                
                shader.fragmentShader = `
                    precision highp float;
                    uniform float uTime;
                    varying vec3 vLPos;
                ` + shader.fragmentShader;

                shader.fragmentShader = shader.fragmentShader.replace(
                    'gl_FragColor = vec4( packNormalToRGB( normal ), opacity );',
                    `
                    vec3 vN = normalize(normal);
                    float dist = length(vLPos);
                    float wave = sin(dist * 0.8 - uTime * 0.6);
                    float c = cos(wave);
                    float s = sin(wave);
                    mat3 rot = mat3(c, s, 0.0, -s, c, 0.0, 0.0, 0.0, 1.0);
                    vN = rot * vN;
                    vec3 finalCol = packNormalToRGB(normalize(vN));
                    finalCol = pow(finalCol, vec3(0.85));
                    gl_FragColor = vec4(finalCol, opacity);
                    `
                );
                matColor.userData.shader = shader;
            };

            mesh = new THREE.Mesh(geometry, matDark);
            scene.add(mesh);
            mesh.geometry.userData = { orig: geometry.attributes.position.array.slice() };

            const handleMove = (x, y) => {
                targetX = (x / window.innerWidth) - 0.5;
                targetY = (y / window.innerHeight) - 0.5;
            };

            // Soporte mouse y touch optimizado
            window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
            window.addEventListener('touchstart', e => {
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: true });
            window.addEventListener('touchmove', e => {
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: false });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function setEffect(mode) {
            const body = document.getElementById('main-body');
            const isDark = mode === 'dark';
            mesh.material = isDark ? matDark : matColor;
            body.style.backgroundColor = isDark ? "#000" : "#fff";
            document.getElementById('btn-dark').classList.toggle('active', isDark);
            document.getElementById('btn-color').classList.toggle('active', !isDark);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.0012;
            if (matColor.userData.shader) matColor.userData.shader.uniforms.uTime.value = time;

            currentX += (targetX - currentX) * 0.06;
            currentY += (targetY - currentY) * 0.06;

            mesh.rotation.x += 0.001;
            mesh.rotation.y += 0.0015;

            const pos = mesh.geometry.attributes.position.array;
            const orig = mesh.geometry.userData.orig;

            for (let i = 0; i < pos.length; i += 3) {
                const amp = 0.25 + (currentX * 1.5);
                pos[i]     = orig[i]     + Math.sin(time + orig[i+1]) * amp;
                pos[i + 1] = orig[i + 1] + Math.cos(time + orig[i]) * amp;
                pos[i + 2] = orig[i + 2] + Math.sin(time + orig[i+2]) * amp;
            }
            mesh.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
