<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Webscape Engine - Secure Core</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; transition: background-color 0.4s ease;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #webscape-ui {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            background: #c0c0c0; border: 2px outset #fff;
            padding: 6px; display: flex; gap: 6px;
            box-shadow: 2px 2px 0 #000;
            font-family: 'Tahoma', sans-serif;
        }
        .ui-label { font-size: 10px; color: #000; align-self: center; font-weight: bold; }
        .mode-btn { background: #c0c0c0; border: 2px outset #fff; padding: 4px 8px; font-size: 10px; cursor: pointer; }
        .mode-btn.active { background: #d0d0d0; border: 2px inset #fff; color: #000080; }
    </style>
</head>
<body id="main-body" style="background-color: #000;">

    <div id="webscape-ui">
        <span class="ui-label">SECURE MODE:</span>
        <button id="btn-dark" class="mode-btn active" onclick="setEffect('dark')">DARK</button>
        <button id="btn-color" class="mode-btn" onclick="setEffect('color')">COLOR</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        /** * --- PROTOCOLO DE SEGURIDAD REFORZADO ---
         * Bloquea clic derecho, F12, Ctrl+Shift+I, Ctrl+U
         */
        (function() {
            // Bloqueo estricto de menú contextual
            document.addEventListener('contextmenu', e => e.preventDefault());

            // Bloqueo de combinaciones de teclas de inspección
            document.addEventListener('keydown', e => {
                if (
                    e.key === "F12" ||
                    (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) ||
                    (e.ctrlKey && e.key === "u") ||
                    (e.ctrlKey && e.key === "s")
                ) {
                    e.preventDefault();
                    return false;
                }
            });

            // Trampa de Debugger: Si abren la consola, el motor intenta pausar su ejecución
            setInterval(() => {
                (function() { return false; }['constructor']('debugger')());
            }, 100);
        })();

        let scene, camera, renderer, mesh, matDark, matColor;
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geometry = new THREE.IcosahedronGeometry(2, 20); 

            matDark = new THREE.MeshNormalMaterial({ wireframe: true, flatShading: true });
            matColor = new THREE.MeshNormalMaterial({ wireframe: true });
            
            matColor.onBeforeCompile = (shader) => {
                shader.uniforms.uTime = { value: 0 };
                shader.vertexShader = `varying vec3 vLPos;\n` + shader.vertexShader;
                shader.vertexShader = shader.vertexShader.replace(`#include <begin_vertex>`, `#include <begin_vertex>\nvLPos = position;`);
                shader.fragmentShader = `uniform float uTime;\nvarying vec3 vLPos;\n` + shader.fragmentShader;
                shader.fragmentShader = shader.fragmentShader.replace(
                    'gl_FragColor = vec4( packNormalToRGB( normal ), opacity );',
                    `
                    vec3 vN = normal;
                    float angle = uTime * 0.4 + length(vLPos) * 0.6;
                    float s = sin(angle); float c = cos(angle);
                    mat3 rot = mat3(c, s, 0.0, -s, c, 0.0, 0.0, 0.0, 1.0);
                    vN = rot * vN;
                    gl_FragColor = vec4( packNormalToRGB( normalize(vN) ), opacity );
                    `
                );
                matColor.userData.shader = shader;
            };

            mesh = new THREE.Mesh(geometry, matDark);
            scene.add(mesh);
            mesh.geometry.userData = { originalPositions: geometry.attributes.position.array.slice() };

            const handleMove = (x, y) => {
                targetX = (x / window.innerWidth) - 0.5;
                targetY = (y / window.innerHeight) - 0.5;
            };

            window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
            window.addEventListener('touchmove', e => {
                if(e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: false });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function setEffect(mode) {
            const body = document.getElementById('main-body');
            const isDark = mode === 'dark';
            mesh.material = isDark ? matDark : matColor;
            body.style.backgroundColor = isDark ? "#000" : "#fff";
            document.getElementById('btn-dark').classList.toggle('active', isDark);
            document.getElementById('btn-color').classList.toggle('active', !isDark);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            if (matColor.userData.shader) matColor.userData.shader.uniforms.uTime.value = time;

            currentX += (targetX - currentX) * 0.05;
            currentY += (targetY - currentY) * 0.05;

            mesh.rotation.x += 0.001;
            mesh.rotation.y += 0.002;

            const pos = mesh.geometry.attributes.position.array;
            const orig = mesh.geometry.userData.originalPositions;

            for (let i = 0; i < pos.length; i += 3) {
                const amp = 0.3 + (currentX * 1.8);
                pos[i]     = orig[i]     + Math.sin(time + orig[i+1]) * amp;
                pos[i + 1] = orig[i + 1] + Math.cos(time + orig[i]) * amp;
                pos[i + 2] = orig[i + 2] + Math.sin(time + orig[i+2]) * amp;
            }
            mesh.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
